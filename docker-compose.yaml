services:
  neo4j:
    image: neo4j:5.26-community
    container_name: blue-shark-neo4j
    ports:
      - '7474:7474'
      - '7687:7687'
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_dbms_security_auth__minimum__password__length: '8'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: blue-shark-backend
    depends_on:
      - neo4j
    environment:
      PORT: 3001
      NEO4J_HTTP_URL: http://neo4j:7474
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
    ports:
      - '3001:3001'
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: blue-shark-frontend
    depends_on:
      - backend
    environment:
      API_BASE_URL: http://backend:3001/api
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
    ports:
      - '3000:3000'
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
